name: Desafio de Variáveis e Escopos

on:
  workflow_dispatch:

env:
  APP_NAME: MeuApp

jobs:
  build_app:
    runs-on: windows-latest
    env:
      BUILD_VERSION: v1.0.0

    steps:
      - name: Passo 1: Variáveis em Escopos Diferentes
        run: |
          Write-Host "App (global): $env:APP_NAME"
          Write-Host "Build version (job): $env:BUILD_VERSION"
        shell: pwsh

      - name: Passo 2: Observando o Escopo da STEP_TEMP
        run: |
          $env:STEP_TEMP = "valor_temporario"
          Write-Host "STEP_TEMP dentro do step: $env:STEP_TEMP"
        shell: pwsh

      - name: Passo 2b - STEP_TEMP fora do step original
        run: |
          Write-Host "STEP_TEMP aqui: $env:STEP_TEMP"
        shell: pwsh

      - name: Passo 3: Auditoria com Variáveis Padrão
        run: |
          Write-Host "O usuário ${{ github.actor }} disparou este workflow no repositório ${{ github.repository }}. O sistema operacional do runner é ${{ runner.os }}."
        shell: pwsh

      - name: Passo 4: Gerar Código Dinâmico
        run: |
          $RANDOM_NUM = Get-Random -Maximum 32768
          "BUILD_HASH=$RANDOM_NUM" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Passo 5: Usar Código Dinâmico
        run: |
          Write-Host "O hash gerado para este build foi: $env:BUILD_HASH"
        shell: pwsh

  deploy_app:
    runs-on: windows-latest
    steps:
      - name: Passo 6: Acessando Secrets e Vars
        run: |
          Write-Host "URL_AMBIENTE: ${{ vars.URL_AMBIENTE }}"
          Write-Host "API_TOKEN_PROD: ${{ secrets.API_TOKEN_PROD }}"
        shell: pwsh
